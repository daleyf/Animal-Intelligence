[tool.black]
line-length = 100
target-version = ["py313"]
exclude = '''
/(
    \.venv
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["core", "db", "api"]
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
fail_under = 50
show_missing = true
skip_covered = false
